services:
  frontend:
    build:
      context: .
      target: dev
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=/api
    volumes:
      - .:/app
      - /app/node_modules
    stdin_open: true
    tty: true

# To connect to backend by service name `backend`:
# 1) Run backend in the same docker network, or
# 2) Replace upstream in nginx.conf for production images.
