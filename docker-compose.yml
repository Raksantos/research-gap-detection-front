services:
  frontend:
    build:
      context: .
      target: dev
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=/api
      # Django on the host machine (Linux Docker 20.10+).
      - BACKEND_ORIGIN=http://host.docker.internal:8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app
      - /app/node_modules
    stdin_open: true
    tty: true

# Run Django on the host at :8000, or add a backend service and point BACKEND_ORIGIN to it.
